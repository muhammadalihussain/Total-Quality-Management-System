<html>
<head>
    <title>iisnode logs</title>
    <style type="text/css">
        body
        {
            font-family: "Trebuchet MS" , Arial, Helvetica, sans-serif;
        }
        table
        {
            border-collapse: collapse;
        }
        td, th
        {
            border: 1px solid lightgray;
            padding: 3px 7px 2px 7px;
        }
        th
        {
            text-align: left;
            padding-top: 5px;
            padding-bottom: 4px;
            background-color: Gray;
            color: #ffffff;
        }
        td.stderr
        {
            color: Red;
        }
    </style>
</head>
<body>
    <table id="logFilesTable">
        <tr>
            <th>
                Computer name
            </th>
            <th>
                PID
            </th>
            <th>
                Type
            </th>
            <th>
                Created
            </th>
            <th>
                Link
            </th>
        </tr>
    </table>
    <p id="lastUpdated"></p>
    <script type="text/javascript">

        // this is replaced with actual data at runtime by code in interceptor.js
        var logFiles = [{"file":"USER-10596-stderr-1777571547849.txt","computername":"USER","pid":10596,"type":"stderr","created":1777571547849},{"file":"USER-11848-stderr-1777574497228.txt","computername":"USER","pid":11848,"type":"stderr","created":1777574497228},{"file":"USER-16840-stderr-1777571546231.txt","computername":"USER","pid":16840,"type":"stderr","created":1777571546231},{"file":"USER-16852-stderr-1777574500562.txt","computername":"USER","pid":16852,"type":"stderr","created":1777574500562},{"file":"USER-18260-stderr-1777565312542.txt","computername":"USER","pid":18260,"type":"stderr","created":1777565312542},{"file":"USER-19196-stderr-1777566017610.txt","computername":"USER","pid":19196,"type":"stderr","created":1777566017610},{"file":"USER-19196-stdout-1777566017609.txt","computername":"USER","pid":19196,"type":"stdout","created":1777566017609},{"file":"USER-20128-stderr-1777574567706.txt","computername":"USER","pid":20128,"type":"stderr","created":1777574567706},{"file":"USER-20128-stdout-1777574567705.txt","computername":"USER","pid":20128,"type":"stdout","created":1777574567705},{"file":"USER-21664-stderr-1777565313165.txt","computername":"USER","pid":21664,"type":"stderr","created":1777565313165},{"file":"USER-3208-stderr-1777574498430.txt","computername":"USER","pid":3208,"type":"stderr","created":1777574498430}];
        var lastUpdated = 1777574568951;
        var date = new Date();

        date.setTime(lastUpdated);
        document.getElementById('lastUpdated').innerHTML = 'Index was last updated ' + date;

        logFiles.sort(function (a, b) {
            return b.created - a.created;
        });

        var logFilesTable = document.getElementById("logFilesTable");
        for (var i = 0; i < logFiles.length; i++) {
            var logFile = logFiles[i];
            date.setTime(logFile.created);
            var row = logFilesTable.insertRow(-1);
            var computerNameCell = row.insertCell(0);
            var pidCell = row.insertCell(1);
            var typeCell = row.insertCell(2);
            var dateCell = row.insertCell(3);
            var logCell = row.insertCell(4);
            computerNameCell.innerHTML = logFile.computername;
            pidCell.innerHTML = logFile.pid.toString();
            typeCell.innerHTML = logFile.type;
            typeCell.setAttribute('class', logFile.type);
            dateCell.innerHTML = date.toString();
            logCell.innerHTML = '<a href="' + logFile.file + '">log</a>';
        };

    </script>
</body>
</html>
